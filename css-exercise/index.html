<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NBA Finals</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <header class="topbar">
        <div class="brand">
            <img src="assets/nba_logo.png" alt="NBA logo" class="brand-icon">
            <p class="logo-text">NBA</p>
        </div>
        <nav class="topnav">
            <a href="#home">HOME</a>
            <a href="#about">ABOUT</a>
            <a href="#game">GAMES</a>
            <a href="#blog">BLOG</a>
            <a href="#contact">CONTACT</a>
            <a href="#ticket" class="ticket-btn btn">BUY TICKET</a>
        </nav>
    </header>

    <main>
        <section id="home">
            <div class="hero">
                <div class="hero-text">
                    <h1 class="punchline">KNICKS <br/> VS SPURS</h1>
                    <p class="subline">A new-age rivalry - battle for the future of the league.</p>
                    <div class="hero-actions">
                        <a href="#game" class="primary-action btn">Watch match</a>
                        <a href="#ticket" class="secondary-action btn">Get ticket</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
    <div class="versus">
        <div class="player">
            <img src="assets/knicks.png" alt="Knicks" class="circle-cut">
            <span class="team-name">Knicks</span>
        </div>
        <span class="vs">VS</span>
        <div class="player">
            <img src="assets/spurs.png" alt="Spurs" class="circle-cut">
            <span class="team-name">Spurs</span>
        </div>

        <div class="match-info">
            <h3 class="match-name">NBA SHOWDOWN</h3>
            <span class="match-category">FINALS</span>
        </div>
        <div class="match-date">
            <div class="match-time">
                <span class="time">171</span>
                <span class="category">Days</span>
            </div>
            <div class="match-time">
                <span class="time">11</span>
                <span class="category">Hours</span>
            </div>
            <div class="match-time">
                <span class="time">10</span>
                <span class="category">Minutes</span>
            </div>
            <div class="match-time">
                <span class="time">39</span>
                <span class="category">Seconds</span>
            </div>
            
        </div>
        <a href="#ticket" class="ticket-btn btn">Buy Tickets</a>
    </div>
    </footer>
</body>
</html>
