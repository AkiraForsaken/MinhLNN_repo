<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FotoBook</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>
  <nav class="bg-blue-800">
    <div class="mx-auto max-w-7xl px-4 lg:px-8">
      <div class="flex h-14 items-center justify-between gap-4 ml-6">

        <!-- Left: Title + Search -->
        <div class="flex items-center gap-6 min-w-0">
          <span class="shrink-0 text-xl font-semibold text-white">FotoBook</span>

          <form class="hidden sm:block w-64 md:w-80">
            <label for="search" class="sr-only">Search</label>
            <div class="relative">
              <input type="search" id="search"
                class="block w-full rounded-md border-0 bg-white py-2 px-3 text-sm text-gray-900 shadow-xs focus:ring-2 focus:ring-inset focus:ring-blue-500"
                placeholder="Search photos / albums"
              />
            </div>
          </form>
        </div>

        <!-- Right: Profile + Logout -->
        <div class="flex items-center gap-6 mr-10">
          <div class="flex items-center gap-2">
            <img class="text-center h-8 w-8 rounded-full object-cover ring-2 ring-white/50" src="" alt="JD" />
            <span class="hidden md:block text-sm font-medium text-white">Jane Doe</span>
          </div>
          <button type="button" class="cursor-pointer rounded-md bg-blue-600 p-2 text-md text-white font-semibold hover:bg-blue-700">
            Logout
          </button>
        </div>
      </div>
      <!-- Mobile search -->
      <div class="block sm:hidden pb-3">
        <label for="search-mobile" class="sr-only">Search</label>
        <div class="relative">
          <input
            type="search"
            id="search-mobile"
            class="block w-full rounded-md border-0 bg-white py-2 px-3 text-sm text-gray-900 shadow-xs focus:ring-2 focus:ring-inset focus:ring-blue-400"
            placeholder="Search photos / albums"
          />
        </div>
      </div>
    </div>
  </nav>

  <div class="mx-auto flex max-w-screen gap-6 p-6">
    <div class="hidden min-w-28 shrink-0 sm:block">
      <nav class="space-y-1">
        <a href="#"feeds class="flex items-center gap-3 rounded-md bg-blue-50 px-3 py-2 text-sm font-medium text-blue-800">
          <i class="fa-solid fa-house w-5 text-center"></i>
          Feeds
        </a>
        <a href="#discover" class="flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100">
          <i class="fa-solid fa-compass w-5 text-center"></i>
          Discovery
        </a>
      </nav>
    </div>

    <main class="flex-1 mx-4 grid grid-cols-1 gap-6 md:grid-cols-2">
      <!-- Post card -->
      <article class="flex items-start overflow-hidden rounded-lg bg-white shadow-sm ring-1 ring-gray-200">
        <img class="aspect-square w-[60%] shrink-0 object-cover" src="https://picsum.photos/seed/1/600/600" alt="Posted photo" />
        <div class="flex flex-col justify-center h-full gap-2 px-4 py-3">
          <div class="flex items-center gap-3">
            <img class="h-8 w-8 rounded-full object-cover" src="https://i.pravatar.cc/64?img=1" alt="" />
            <span class="text-sm font-medium text-gray-900">Jane Doe</span>
          </div>
          <p class="text-sm text-gray-700">Golden hour at the lake. 🌅</p>
          <div class="mt-auto flex items-center gap-1 text-sm text-gray-500">
            <i class="fa-solid fa-heart text-red-500"></i>
            <span>128 likes</span>
          </div>
        </div>
      </article>

  </div>
</body>
</html>
