  <!-- Mobile sidebar overlay -->

  <!-- Mobile sidebar -->
  <aside id="mobile-sidebar"
    class="fixed inset-y-0 left-0 z-40 w-64 -translate-x-full transform bg-white shadow-lg transition-transform duration-200 ease-in-out">
    <div class="flex h-14 items-center justify-end px-4">
      <button id="sidebar-close" aria-label="Close menu" aria-controls="mobile-sidebar" aria-expanded="false"
        class="p-2 text-gray-700 hover:bg-gray-100 rounded-md">

    <nav class="mt-4 space-y-1 px-2">

        Discovery

    </nav>

  <script>
    const menuButton = document.getElementById('menu-button');
    const sidebar = document.getElementById('mobile-sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const closeBtn = document.getElementById('sidebar-close');
    let triggerElement = null;

    // Get all focusable elements within the sidebar
    function getFocusableElements() {
      return Array.from(sidebar.querySelectorAll(
        'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
      )).filter(ele => !ele.hasAttribute('disabled'));
    }

    // Handle Tab key
    function handleSidebarKeydown(e) {
      if (e.key !== 'Tab') return;

      const focusableElements = getFocusableElements();
      const firstElement = focusableElements[0];
      const lastElement = focusableElements[focusableElements.length - 1];
      const activeElement = document.activeElement;

      // Tab on last element - move to first
      if (e.shiftKey === false && activeElement === lastElement) {
        e.preventDefault();
        firstElement?.focus();
      }
      // Shift+Tab on first element - move to last
      else if (e.shiftKey === true && activeElement === firstElement) {
        e.preventDefault();
        lastElement?.focus();
      }
    }

    function openSidebar() {
      triggerElement = document.activeElement; // Store the element that triggered open
      sidebar.classList.remove('-translate-x-full');
      overlay.classList.remove('hidden');
      document.body.classList.add('overflow-hidden');

      // Move focus into sidebar (to close button)
      closeBtn?.focus();

      // Add focus trap listener
      sidebar.addEventListener('keydown', handleSidebarKeydown);
    }

    function closeSidebar() {
      sidebar.classList.add('-translate-x-full');
      overlay.classList.add('hidden');
      document.body.classList.remove('overflow-hidden');
      sidebar.removeEventListener('keydown', handleSidebarKeydown);
      // Return focus to the menu button that triggered the open
      triggerElement?.focus();
    }

    menuButton?.addEventListener('click', openSidebar);
    closeBtn?.addEventListener('click', closeSidebar);
    overlay?.addEventListener('click', closeSidebar);
    // close on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !sidebar.classList.contains('-translate-x-full')) {
        closeSidebar();
      }
    });
  </script>
