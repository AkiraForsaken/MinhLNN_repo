<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculator</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./script.js" defer></script>
</head>
<body>
  <div class="container">
    <div id="screen" class="screen">0</div>
    <div class="row">
      <div class="btn"></div>
      <div class="btn"></div>
      <div id="clear" class="btn">AC</div>
      <div id="back" class="btn">DC</div>
    </div>
    <div class="row">
      <div id="7" class="btn">7</div>
      <div id="8" class="btn">8</div>
      <div id="9" class="btn">9</div>
      <div id="/" class="btn">/</div>
    </div>
    <div class="row">
      <div id="4" class="btn">4</div>
      <div id="5" class="btn">5</div>
      <div id="6" class="btn">6</div>
      <div id="x" class="btn">x</div>
    </div>
    <div class="row">
      <div id="1" class="btn">1</div>
      <div id="2" class="btn">2</div>
      <div id="3" class="btn">3</div>
      <div id="-" class="btn">-</div>
    </div>
    <div class="row">
      <div id="0" class="btn">0</div>
      <div id="." class="btn">.</div>
      <div id="=" class="btn">=</div>
      <div id="+" class="btn">+</div>
    </div>
  </div>
</body>

</html>
